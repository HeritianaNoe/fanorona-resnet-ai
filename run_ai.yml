name: Run Fanorona AI in Background

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-ai-job:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install TensorFlow and Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tensorflow numpy

    - name: Run Fanorona AI Model
      run: |
        python model.py

    - name: Upload Trained Model Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fanorona-trained-model
        path: |
          fanorona_model.tflite
          fanorona_resnet_model.h5
